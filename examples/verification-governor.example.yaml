layer_id: verification-governor
name: Verification Governor
version: v0.4.0-candidate

description: >
  A reasoning control layer that verifies hypotheses, checks evidence,
  detects contradictions, identifies unsupported inference, and prevents
  self-dialogue from becoming overconfident conclusion.

purpose: >
  To ensure that hypotheses generated by the Self-Dialogue Loop are verified
  before they are compressed, concluded, or used to re-ignite another reasoning
  cycle.

position:
  previous_layer: expansion
  current_layer: verification_governor
  next_layer: compression

verification_types:
  - evidence_check
  - contradiction_check
  - scope_check
  - unsupported_inference_check
  - loop_check
  - confidence_check
  - human_review_check

responsibilities:
  - check_hypothesis_evidence
  - detect_branch_contradictions
  - detect_unsupported_inference
  - check_scope_boundary
  - detect_repeated_loops
  - reduce_overconfidence
  - determine_human_review_need
  - prepare_verified_material_for_compression

input_contract:
  required_inputs:
    - initial_question
    - counter_questions
    - self_dialogue_trace
    - candidate_hypotheses
    - tested_hypotheses
    - contradiction_findings
    - selected_branches
    - summary_for_verification
  optional_inputs:
    - source_context
    - evidence_context
    - risk_context
    - known_constraints
    - prior_trace
    - user_intent
    - previous_decision

output_contract:
  required_outputs:
    - verification_findings
    - evidence_findings
    - contradiction_findings
    - unsupported_inference_findings
    - scope_findings
    - confidence_adjustments
    - summary_for_compression
    - decision

verification_findings:
  - finding: >
      The selected hypothesis is partially supported by the self-dialogue trace
      but still requires external or explicit evidence before it can be treated
      as a conclusion.
    type: evidence_check
    target: selected_hypothesis
    severity: medium
    evidence_status: partially_supported
    contradiction_detected: false
    recommended_action: reduce_confidence

  - finding: >
      One contradiction risk remains: if the counter-question layer found
      unresolved ambiguity, the reasoning cycle may need to return to premise
      testing before continuing.
    type: contradiction_check
    target: contradiction_findings
    severity: medium
    evidence_status: not_applicable
    contradiction_detected: true
    recommended_action: return_to_counter_question

  - finding: >
      The current reasoning scope is still within one cycle because the
      hypothesis has been narrowed to controlled hypothesis development rather
      than final autonomous-agent implementation.
    type: scope_check
    target: reasoning_scope
    severity: low
    evidence_status: supported
    contradiction_detected: false
    recommended_action: continue

  - finding: >
      The self-dialogue trace contains one inference that should remain marked
      as exploratory: controlled reasoning can continue if unresolved
      assumptions are preserved for verification.
    type: unsupported_inference_check
    target: exploratory_inference
    severity: high
    evidence_status: partially_supported
    contradiction_detected: false
    recommended_action: reduce_confidence

  - finding: >
      No repeated loop pattern was detected across the current self-dialogue
      turns. The reasoning branch progressed from hypothesis generation to
      contradiction probing and summary preparation.
    type: loop_check
    target: self_dialogue_trace
    severity: info
    evidence_status: not_applicable
    contradiction_detected: false
    recommended_action: continue

  - finding: >
      Confidence should remain medium rather than high because the hypothesis
      has not yet passed through evidence-backed validation.
    type: confidence_check
    target: confidence_level
    severity: medium
    evidence_status: partially_supported
    contradiction_detected: false
    recommended_action: reduce_confidence

  - finding: >
      Human review is not required for this example because the reasoning is
      exploratory, low-risk, and trace-preserving. Human review may still be
      requested if the engine attempts to convert the hypothesis into an
      operational deployment decision.
    type: human_review_check
    target: review_condition
    severity: low
    evidence_status: not_applicable
    contradiction_detected: false
    recommended_action: continue

decision_policy:
  allowed_decisions:
    - continue_to_compression
    - hold_for_evidence
    - return_to_self_dialogue
    - return_to_counter_question
    - request_human_review
    - stop_cycle
  default_decision: continue_to_compression

safety_controls:
  evidence_required: true
  contradiction_check_required: true
  unsupported_inference_check_required: true
  loop_check_required: true
  confidence_adjustment_required: true
  human_review_gate: true
